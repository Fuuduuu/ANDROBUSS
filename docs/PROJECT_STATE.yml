governance:
  project_state_role: "Snapshot-only state record; not canonical truth source by itself."
  audit_index: "docs/AUDIT_INDEX.md"
  audit_loading_policy: "Read audit index first; open docs/audit/PASS_*.md on demand."
  archive_policy: "docs/archive/** is historical-only and not default context."
  accepted_guardrails:
    - "PASS_G03 audit-index/read-order sync accepted"
    - "PASS_AUTO_01 detekt module-boundary checks accepted"
    - "DRIFT_CHECK_RULE_SYNC_PASS accepted"
    - "PASS_AUTO_02 dependency locking accepted"
    - "PASS_27 Hilt DI baseline accepted"
    - "PASS_AUTO_03 drift and boundary verification accepted"
    - "PASS_28C first Compose search screen baseline accepted"
    - "PASS_AUTO_06 drift and UI baseline boundary verification accepted"
    - "PASS_UI_01 search screen smoke and wording polish accepted"
    - "PASS_29A quick-destination readiness evidence accepted"
    - "PASS_29C real-runtime-feed policy gating accepted"
    - "PASS_30 real static runtime baseline accepted"
    - "PASS_31 quick-destination chips UI-only accepted"
  drift_check_rule: "Every 5 accepted pass/checkpoints, run a docs-only drift-check before the next large implementation pass."
  drift_check_counter: "0 / 5 (reset by PASS_AUTO_07 after PASS_31 acceptance)"
  next_mandatory_drift_check: "Run next docs-only drift-check after 5 newly accepted checkpoints."
  drift_check_must_verify:
    - "CURRENT_STATE / ROADMAP / PROJECT_STATE alignment"
    - "AUDIT_INDEX includes recent passes"
    - "No fact lives in multiple places"
    - "\"Next step\" lives in only one canonical place"
    - "TRUTH_INDEX / PROTECTED_SURFACES updated if needed"
    - "Scope has not silently expanded"
    - "Old audit/docs are not misleading future prompts"
  drift_found_action: "Run a small docs-only cleanup/sync pass before continuing implementation."

architecture:
  pure_kotlin_modules:
    - core-domain
    - core-gtfs
    - core-routing
    - city-adapters
  android_modules:
    - app
    - data-local
    - data-remote
    - feature-search
    - feature-map
    - feature-stop-board
    - feature-route-detail
    - feature-favourites
    - feature-alerts

invariants:
  critical:
    - id: INV-001
      rule: "StopPointId must come only from actual StopPoint.id or persisted stopId originally mapped from StopPoint.id."
      test: "StopCandidateEnricherTest::anti fabrication guard keeps verified stop id only; StopResolutionBridgeIntegrationTest::anti fabrication guard keeps GTFS stop ids only"
    - id: INV-002
      rule: "core-domain, core-gtfs, core-routing, and city-adapters must remain Android-free."
      test: "GtfsDomainMapperTest::parser and mapper public APIs remain Android-free; DirectRouteSearchTest::core routing remains Android free; CityAdapterRegistryTest::city adapter metadata remains android free; TODO_CORE_DOMAIN_ANDROID_FREE_TEST_REQUIRED"
    - id: INV-003
      rule: "Same public stop name must not collapse distinct StopPointIds."
      test: "GtfsDomainMapperTest::same-name stops with different stop_id remain separate StopPoints; GtfsFixtureSearchPipelineIntegrationTest::AnniVibe lesson - same-name Keskpeatus resolves to two distinct stop ids"
    - id: INV-004
      rule: "RoutePattern stop order must be preserved."
      test: "DomainInvariantsTest::RoutePattern preserves ordered stops; GtfsDomainMapperTest::mapper creates RoutePattern ordered by stop sequence"
    - id: INV-005
      rule: "Loop/circular RoutePatterns may contain duplicate StopPointIds."
      test: "DomainInvariantsTest::RoutePattern allows duplicate StopPointIds for loop compatibility; DirectRouteSearchTest::duplicate StopPointId loop pattern still finds valid later segment"
    - id: INV-006
      rule: "Room storage identity must be scoped by cityId + feedId + localId."
      test: "FeedEntityMapperTest::StopPoint round-trip keeps scoped key and identity; FeedSnapshotDaoTest::same stopId may exist across feed scopes; FeedSnapshotDaoTest::same patternId may exist across feed scopes"
    - id: INV-007
      rule: "DomainFeedSnapshotProvider must live in a neutral/core boundary before data-local implements it."
      test: "RoomDomainFeedSnapshotLoaderTest::getSnapshot returns null before prepare; RoomDomainFeedSnapshotLoaderTest::prepare loads snapshot into cache; RoomDomainFeedSnapshotLoaderTest::DomainFeedSnapshotProvider type comes from core-domain package"

risks:
  active:
    - "Room provider cache is city-keyed; last prepare(city, feed) selects active feed per city."
    - "Bootstrap cold start depends on Room-first prepare policy for configured bootstrap feed scope."
    - "AUTO-04 hardening checks only configured bootstrap feedId; active-feed/freshness policy remains future work."
    - "AUTO-05 detekt rules are boundary-only and intentionally do not enforce style/complexity hygiene."
    - "PASS 28C introduces first Compose search UI baseline, but it remains MVP/diagnostic-only and single-screen."
    - "Origin selection remains dev-only hardcoded chips; nearest-stop/GPS origin flow is not implemented."
    - "Runtime bootstrap now prefers a real static Rakvere profile, but this remains internal/MVP baseline only."
    - "Public production freshness/update policy is still unresolved without downloader/update lifecycle."
    - "Quick-destination UI must keep using query-text resolver path; direct StopPointId shortcuts are forbidden."
    - "Tõrma remains excluded from quick chips until metadata/alias policy pass."
    - "Room schema/import baseline has no freshness/hash/version metadata yet."
    - "Docs are growing; docs hygiene should be a later explicit pass."
  deferred:
    - "Production feed downloader."
    - "UI/ViewModel."
    - "Nearest-stop/geospatial logic."
    - "Realtime."

validation:
  required_commands:
    - "py -3 tools/validate_project_state.py"
    - ".\\gradlew.bat :app:test"
    - ".\\gradlew.bat detekt"
    - ".\\gradlew.bat build"
    - ".\\gradlew.bat test"
    - "git diff --check"
    - "git status --short --untracked-files=all"
    - "git diff --name-only"

debug:
  state: clean
  last_failing_test: null
  last_failing_commit: null
