  next_recommended_pass: PASS_32_ORIGIN_SELECTION_IMPROVEMENT_SCOPE_AUDIT

scope:
  current_goal: "Docs-only drift/state sync and UI boundary verification after PASS 31 quick-destination chips."
  allowed_surfaces:
    - docs/PROJECT_STATE.yml
    - docs/CURRENT_STATE.md
    - docs/ROADMAP.md
    - docs/AUDIT_INDEX.md
    - docs/TESTING_STRATEGY.md
    - docs/CODEBASE_IMPACT_MAP.md
    - docs/ANDROID_ARCHITECTURE.md
    - docs/UX_PRINCIPLES.md
    - docs/audit/PASS_AUTO_07_DRIFT_AND_UI_BOUNDARY_CHECK.md
