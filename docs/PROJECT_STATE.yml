project:
  name: ANDROBUSS
  branch: main
  remote: https://github.com/Fuuduuu/ANDROBUSS.git
  last_accepted_commit: 49dd54d
  last_known_good_commit: 49dd54d
  current_pass: PASS_23
  next_recommended_pass: PASS_24_FEED_IMPORT_APP_WIRING_DECISION_DOCS

scope:
  current_goal: "Add DomainFeedSnapshot -> Room import writer and parser-to-Room-to-provider integration coverage."
  allowed_surfaces:
    - data-local/build.gradle.kts
    - data-local/src/main/kotlin/ee/androbus/data/local/importer/FeedSnapshotImporter.kt
    - data-local/src/main/kotlin/ee/androbus/data/local/dao/FeedSnapshotDao.kt
    - data-local/src/test/kotlin/ee/androbus/data/local/importer/FeedSnapshotImporterTest.kt
    - data-local/src/test/kotlin/ee/androbus/data/local/integration/RoomFeedImportIntegrationTest.kt
    - .github/workflows/ci.yml
    - docs/PROJECT_STATE.yml
    - docs/CURRENT_STATE.md
    - docs/ROADMAP.md
    - docs/TRUTH_INDEX.md
    - docs/GTFS_PIPELINE.md
    - docs/TESTING_STRATEGY.md
    - docs/CODEBASE_IMPACT_MAP.md
    - docs/audit/PASS_23_FEED_SNAPSHOT_IMPORTER_AND_CI_TEST.md
  forbidden_surfaces:
    - app/src/
    - core-gtfs/src/
    - core-routing/src/
    - city-adapters/src/
    - data-remote/src/
    - feature-search/src/main/**
    - core-domain/src/
